<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学群詳細 | 学歴アカデミー</title>
  <meta name="description" content="各大学群の詳細データ。所属大学の偏差値・就職力スコア・年収を比較。学歴フィルターの目安も確認できます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ===== Groups Detail Page Specific Styles ===== */
    .detail-hero {
      padding: 3rem 1rem 2rem;
      text-align: center;
      color: #fff;
      transition: background 0.3s;
    }
    .detail-hero h1 {
      font-size: 2.2rem;
      font-weight: 900;
      margin-bottom: 0.25rem;
    }
    .detail-hero .detail-fullname {
      font-size: 1rem;
      opacity: 0.85;
      margin-bottom: 1rem;
    }
    .detail-hero-stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      flex-wrap: wrap;
    }
    .detail-hero-stat {
      text-align: center;
    }
    .detail-hero-stat .label {
      font-size: 0.75rem;
      opacity: 0.7;
    }
    .detail-hero-stat .value {
      font-size: 1.5rem;
      font-weight: 900;
    }

    .detail-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    /* Section titles */
    .section-title {
      font-size: 1.3rem;
      font-weight: 900;
      color: #1e293b;
      margin-bottom: 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 3px solid #e2e8f0;
    }

    /* University Cards */
    .uni-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.25rem;
      margin-bottom: 2.5rem;
    }
    .uni-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid #e2e8f0;
      padding: 1.25rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .uni-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
    }
    .uni-card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .uni-card-name {
      font-size: 1.1rem;
      font-weight: 900;
      color: #1e293b;
    }
    .uni-card-pref {
      font-size: 0.75rem;
      color: #64748b;
      margin-top: 0.2rem;
    }
    .uni-card-hensachi {
      font-size: 1.3rem;
      font-weight: 900;
      padding: 0.3rem 0.7rem;
      border-radius: 10px;
      min-width: 3.5rem;
      text-align: center;
      flex-shrink: 0;
    }
    .hensachi-70 { background: #fef2f2; color: #dc2626; border: 2px solid #fca5a5; }
    .hensachi-60 { background: #fffbeb; color: #d97706; border: 2px solid #fcd34d; }
    .hensachi-50 { background: #f0fdf4; color: #16a34a; border: 2px solid #86efac; }
    .hensachi-40 { background: #eff6ff; color: #2563eb; border: 2px solid #93c5fd; }

    /* Bar Chart */
    .uni-card-bars {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .bar-label {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 500;
      width: 4rem;
      flex-shrink: 0;
      text-align: right;
    }
    .bar-track {
      flex: 1;
      height: 14px;
      background: #f1f5f9;
      border-radius: 7px;
      overflow: hidden;
    }
    .bar-fill {
      height: 100%;
      border-radius: 7px;
      transition: width 0.6s ease;
      min-width: 2px;
    }
    .bar-value {
      font-size: 0.8rem;
      font-weight: 700;
      width: 3rem;
      flex-shrink: 0;
    }

    /* Filter Level Section */
    .filter-section {
      margin-bottom: 2.5rem;
    }
    .filter-info-card {
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      border: 1px solid #e2e8f0;
      padding: 1.5rem;
    }
    .filter-level-badge {
      display: inline-block;
      padding: 0.4rem 1rem;
      border-radius: 8px;
      font-weight: 900;
      font-size: 1rem;
      margin-bottom: 1rem;
    }
    .filter-industries {
      margin-top: 0.75rem;
    }
    .filter-industry-item {
      display: flex;
      align-items: center;
      padding: 0.5rem 0;
      border-bottom: 1px solid #f1f5f9;
    }
    .filter-industry-item:last-child {
      border-bottom: none;
    }
    .filter-industry-name {
      font-weight: 700;
      font-size: 0.9rem;
      color: #1e293b;
      min-width: 140px;
    }
    .filter-industry-status {
      font-size: 0.8rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-weight: 700;
      margin-left: 0.5rem;
    }
    .status-pass { background: #dcfce7; color: #16a34a; }
    .status-maybe { background: #fffbeb; color: #d97706; }
    .status-hard { background: #fef2f2; color: #dc2626; }
    .filter-industry-note {
      font-size: 0.8rem;
      color: #64748b;
      margin-left: auto;
      padding-left: 0.5rem;
    }

    /* Related Groups */
    .related-section {
      margin-bottom: 2.5rem;
    }
    .related-groups {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .related-group-card {
      flex: 1;
      min-width: 200px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      border: 1px solid #e2e8f0;
      padding: 1.25rem;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
      display: block;
    }
    .related-group-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.1);
    }
    .related-direction {
      font-size: 0.75rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .related-name {
      font-size: 1.1rem;
      font-weight: 900;
      margin-bottom: 0.2rem;
    }
    .related-range {
      font-size: 0.85rem;
      color: #64748b;
    }

    /* No Group Selected */
    .no-group {
      text-align: center;
      padding: 4rem 1rem;
    }
    .no-group h2 {
      font-size: 1.5rem;
      font-weight: 900;
      color: #1e293b;
      margin-bottom: 1rem;
    }
    .no-group p {
      color: #64748b;
      margin-bottom: 2rem;
    }
    .no-group-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      justify-content: center;
    }
    .no-group-link {
      display: inline-block;
      padding: 0.6rem 1.2rem;
      border-radius: 10px;
      font-weight: 700;
      text-decoration: none;
      color: #fff;
      font-size: 0.9rem;
      transition: opacity 0.2s, transform 0.2s;
    }
    .no-group-link:hover {
      opacity: 0.85;
      transform: translateY(-2px);
    }

    /* Responsive */
    @media (max-width: 768px) {
      .detail-hero h1 { font-size: 1.6rem; }
      .detail-hero-stats { gap: 1rem; }
      .uni-cards { grid-template-columns: 1fr; }
      .filter-industry-item { flex-wrap: wrap; }
      .filter-industry-note { margin-left: 0; padding-left: 0; margin-top: 0.25rem; width: 100%; }
      .related-groups { flex-direction: column; }
    }
  </style>
