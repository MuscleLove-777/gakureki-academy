<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>大学群一覧 | 学歴アカデミー</title>
  <meta name="description" content="東京一工、早慶、MARCH、関関同立、日東駒専など主要大学群を一覧で比較。各大学群の偏差値帯・所属大学数・特徴を確認できます。">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <style>
    /* ===== Groups Index Page Specific Styles ===== */
    .groups-hero {
      background: linear-gradient(135deg, #0f3460 0%, #16213e 50%, #1a1a2e 100%);
      padding: 3rem 1rem 2rem;
      text-align: center;
      color: #fff;
    }
    .groups-hero h1 {
      font-size: 2rem;
      font-weight: 900;
      margin-bottom: 0.5rem;
    }
    .groups-hero p {
      color: #94a3b8;
      font-size: 0.95rem;
      max-width: 600px;
      margin: 0 auto;
    }

    .groups-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 2rem 1rem 4rem;
    }

    .groups-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 1.5rem;
    }

    .group-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      border: 1px solid #e2e8f0;
      overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
      display: flex;
      flex-direction: column;
    }
    .group-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.12);
    }

    .group-card-header {
      padding: 1.5rem 1.5rem 1rem;
      position: relative;
    }
    .group-card-header::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
    }

    .group-card-name {
      font-size: 1.4rem;
      font-weight: 900;
      margin-bottom: 0.25rem;
    }
    .group-card-fullname {
      font-size: 0.8rem;
      color: #64748b;
      line-height: 1.4;
    }

    .group-card-body {
      padding: 0 1.5rem 1.5rem;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .group-card-stats {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    .group-stat {
      flex: 1;
      background: #f8fafc;
      border-radius: 10px;
      padding: 0.75rem;
      text-align: center;
    }
    .group-stat-label {
      font-size: 0.7rem;
      color: #64748b;
      font-weight: 500;
      margin-bottom: 0.25rem;
    }
    .group-stat-value {
      font-size: 1.1rem;
      font-weight: 900;
    }

    .group-card-desc {
      font-size: 0.85rem;
      color: #475569;
      line-height: 1.6;
      margin-bottom: 1rem;
      flex: 1;
    }

    .group-card-filter {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 0.3rem 0.6rem;
      border-radius: 6px;
      margin-bottom: 1rem;
    }

    .group-card-link {
      display: block;
      text-align: center;
      padding: 0.85rem;
      font-weight: 700;
      font-size: 0.9rem;
      text-decoration: none;
      border-radius: 10px;
      transition: all 0.3s;
      margin-top: auto;
    }
    .group-card-link:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    @media (max-width: 768px) {
      .groups-hero h1 {
        font-size: 1.5rem;
      }
      .groups-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../" class="site-logo">
        <span class="logo-icon">&#x1F393;</span>
        <span class="logo-text">学歴アカデミー</span>
      </a>
      <nav class="site-nav">
        <a href="../ranking/" class="nav-link">偏差値ランキング</a>
        <a href="../groups/" class="nav-link active">大学群一覧</a>
        <a href="../career/" class="nav-link">就職・キャリア</a>
        <a href="../tools/" class="nav-link">診断ツール</a>
      </nav>
      <button class="nav-toggle" aria-label="メニュー">
        <span></span><span></span><span></span>
      </button>
    </div>
  </header>

  <!-- Hero -->
  <section class="groups-hero">
    <h1>大学群一覧</h1>
    <p>日本の主要大学群を一覧で比較。各グループの偏差値帯、所属大学数、就職市場での位置づけを確認できます。</p>
  </section>

  <!-- Groups Grid -->
  <div class="groups-container">
    <div class="groups-grid" id="groupsGrid">
      <!-- JS で動的生成 -->
    </div>
  </div>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-inner">
      <p>&copy; 2026 学歴アカデミー All rights reserved.</p>
      <p class="footer-note">当サイトの偏差値・データは参考値です。最新情報は各大学の公式サイトをご確認ください。</p>
    </div>
  </footer>

  <script src="../js/data.js"></script>
  <script>
    (function() {
      'use strict';

      var grid = document.getElementById('groupsGrid');
      var groupKeys = Object.keys(GROUPS);

      groupKeys.forEach(function(key) {
        var g = GROUPS[key];
        // 所属大学数
        var members = UNIVERSITY_DATA.filter(function(u) { return u.group === key; });
        var count = members.length;

        // 平均偏差値
        var avgHensachi = 0;
        if (count > 0) {
          var sum = members.reduce(function(s, u) { return s + u.hensachi; }, 0);
          avgHensachi = (sum / count).toFixed(1);
        }

        // フィルターレベルの色
        var filterBg, filterColor;
        switch (g.filterLevel) {
          case '最上位': filterBg = '#fef2f2'; filterColor = '#dc2626'; break;
          case '上位':   filterBg = '#fffbeb'; filterColor = '#d97706'; break;
          case '中位':   filterBg = '#eff6ff'; filterColor = '#2563eb'; break;
          default:       filterBg = '#f0fdf4'; filterColor = '#16a34a'; break;
        }

        var card = document.createElement('div');
        card.className = 'group-card';
        card.innerHTML =
          '<div class="group-card-header" style="border-top: 4px solid ' + g.color + '">' +
            '<div class="group-card-name" style="color: ' + g.color + '">' + g.name + '</div>' +
            '<div class="group-card-fullname">' + g.fullName + '</div>' +
          '</div>' +
          '<div class="group-card-body">' +
            '<div class="group-card-stats">' +
              '<div class="group-stat">' +
                '<div class="group-stat-label">偏差値帯</div>' +
                '<div class="group-stat-value" style="color: ' + g.color + '">' + g.hensachiRange + '</div>' +
              '</div>' +
              '<div class="group-stat">' +
                '<div class="group-stat-label">所属大学数</div>' +
                '<div class="group-stat-value">' + count + '校</div>' +
              '</div>' +
              '<div class="group-stat">' +
                '<div class="group-stat-label">平均偏差値</div>' +
                '<div class="group-stat-value" style="color: ' + g.color + '">' + avgHensachi + '</div>' +
              '</div>' +
            '</div>' +
            '<span class="group-card-filter" style="background: ' + filterBg + '; color: ' + filterColor + '">学歴フィルター: ' + g.filterLevel + '</span>' +
            '<p class="group-card-desc">' + g.description + '</p>' +
            '<a href="detail.html#' + key + '" class="group-card-link" style="background: ' + g.color + '; color: #fff;">詳細を見る</a>' +
          '</div>';

        grid.appendChild(card);
      });

      // ハンバーガーメニュー
      var navToggle = document.querySelector('.nav-toggle');
      var siteNav = document.querySelector('.site-nav');
      if (navToggle && siteNav) {
        navToggle.addEventListener('click', function() {
          siteNav.classList.toggle('open');
          navToggle.classList.toggle('open');
        });
      }
    })();
  </script>
</body>
</html>
